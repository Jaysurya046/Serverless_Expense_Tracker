<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Serverless Finance</p>
      <h1>Expense Tracker</h1>
    </div>
    <div class="total-box">
      <span>Total</span>
      <strong id="totalAmount">₹0.00</strong>
    </div>
  </header>

  <main class="app-shell">
    <section class="panel form-panel">
      <div class="panel-heading">
        <h2>Add Expense</h2>
        <div id="loadingIndicator" class="loading" hidden>Loading...</div>
      </div>

      <form id="expenseForm" novalidate>
        <label>
          Amount
          <input id="amount" name="amount" type="number" min="0.01" step="0.01" placeholder="45.00" required>
        </label>

        <label>
          Category
          <input id="category" name="category" type="text" maxlength="40" placeholder="Groceries" required>
        </label>

        <label>
          Date
          <input id="date" name="date" type="date" required>
        </label>

        <label class="full-width">
          Note
          <input id="note" name="note" type="text" maxlength="120" placeholder="Weekly market run">
        </label>

        <button type="submit">Add Expense</button>
      </form>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <h2>Monthly Summary</h2>
      </div>
      <div class="chart-wrap">
        <canvas id="summaryChart"></canvas>
      </div>
    </section>

    <section class="panel list-panel">
      <div class="panel-heading list-heading">
        <h2>Expenses</h2>
        <label class="filter-label">
          Category
          <select id="categoryFilter">
            <option value="">All</option>
          </select>
        </label>
      </div>
      <div id="expenseList" class="expense-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
