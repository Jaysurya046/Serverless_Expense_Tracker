AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Serverless Expense Tracker using S3, API Gateway REST API, Lambda, and DynamoDB.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: !Ref ExpensesTable

Resources:
  ExpensesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Expenses
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: expenseId
          AttributeType: S
      KeySchema:
        - AttributeName: expenseId
          KeyType: HASH

  ExpenseApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: ExpenseTrackerApi
      StageName: Prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type'"
        AllowMethods: "'OPTIONS,GET,POST,DELETE'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type'"
              Access-Control-Allow-Methods: "'OPTIONS,GET,POST,DELETE'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type'"
              Access-Control-Allow-Methods: "'OPTIONS,GET,POST,DELETE'"

  AddExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AddExpenseFunction
      CodeUri: backend/
      Handler: add_expense.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        AddExpense:
          Type: Api
          Properties:
            RestApiId: !Ref ExpenseApi
            Path: /expense
            Method: POST

  GetExpensesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetExpensesFunction
      CodeUri: backend/
      Handler: get_expenses.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExpensesTable
      Events:
        GetExpenses:
          Type: Api
          Properties:
            RestApiId: !Ref ExpenseApi
            Path: /expenses
            Method: GET

  DeleteExpenseFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: DeleteExpenseFunction
      CodeUri: backend/
      Handler: delete_expense.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ExpensesTable
      Events:
        DeleteExpense:
          Type: Api
          Properties:
            RestApiId: !Ref ExpenseApi
            Path: /expense/{id}
            Method: DELETE

  SummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SummaryFunction
      CodeUri: backend/
      Handler: summary.lambda_handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref ExpensesTable
      Events:
        GetSummary:
          Type: Api
          Properties:
            RestApiId: !Ref ExpenseApi
            Path: /summary
            Method: GET

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadForStaticWebsite
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL.
    Value: !Sub "https://${ExpenseApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  FrontendBucketName:
    Description: S3 bucket for static frontend files.
    Value: !Ref FrontendBucket
  FrontendWebsiteUrl:
    Description: S3 static website URL.
    Value: !GetAtt FrontendBucket.WebsiteURL
  ExpensesTableName:
    Description: DynamoDB table name.
    Value: !Ref ExpensesTable
